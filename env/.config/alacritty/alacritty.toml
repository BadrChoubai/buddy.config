[env]
TERM = "xterm-256color"

[terminal]
shell = { program = "/usr/bin/tmux" }

[window]
startup_mode = "Windowed"

[scrolling]
history = 300
multiplier = 3

[keyboard]
bindings = [
	{ key = "V", mods = "Control|Shift", action = "Paste" },
	{ key = "C", mods = "Control|Shift", action = "Copy" }
]

[font]
size = 24
offset = { x = 2, y = 8 }
normal = { family = "JetBrains Mono" }
